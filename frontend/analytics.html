<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Expense Tracker Analytics — Visual breakdown of your spending by category."/>
  <title>Analytics — Expense Tracker</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .analytics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    .chart-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      backdrop-filter: blur(16px);
    }
    .chart-box h3 { margin-bottom: 20px; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
    .chart-canvas-wrap { position: relative; height: 260px; }
    .legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--text-secondary); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .cat-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .cat-table th { text-align: left; padding: 10px 12px; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .cat-table td { padding: 10px 12px; border-bottom: 1px solid rgba(192,132,188,0.07); vertical-align: middle; }
    .cat-table tr:last-child td { border: none; }
    .period-tabs { display: flex; gap: 6px; }
    .period-tab { padding: 6px 14px; border-radius: var(--radius-full); font-size: 0.8rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-muted); transition: all var(--transition-fast); }
    .period-tab.active { background: var(--primary-light); color: #fff; border-color: var(--primary-light); }
    @media (max-width: 900px) { .analytics-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="bg-mesh">
<div id="toast-container"></div>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <a href="index.html" class="sidebar-logo">
    <div class="logo-icon"><i class="fa-solid fa-wallet"></i></div>
    <div>
      <div class="logo-text">ExpenseTracker</div>
      <div class="logo-sub">Smart Finances</div>
    </div>
  </a>
  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-label">Main</div>
      <a href="dashboard.html" class="nav-link" data-page="dashboard"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <a href="analytics.html" class="nav-link" data-page="analytics"><i class="fa-solid fa-chart-pie"></i> Analytics</a>
      <a href="budget.html"    class="nav-link" data-page="budget"><i class="fa-solid fa-bullseye"></i> Budget Goals</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Account</div>
      <a href="#" class="nav-link" id="logoutBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="sidebarAvatar">U</div>
      <div>
        <div class="user-name"  id="sidebarUserName">Loading...</div>
        <div class="user-email" id="sidebarUserEmail"></div>
      </div>
    </div>
  </div>
</aside>

<!-- Main -->
<div class="app-layout">
  <div class="main-content">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="hamburger" id="hamburger" aria-label="Toggle menu"><i class="fa-solid fa-bars"></i></button>
        <div class="topbar-title"><i class="fa-solid fa-chart-pie" style="color:var(--accent);margin-right:8px"></i>Analytics</div>
      </div>
      <div class="topbar-right">
        <div class="period-tabs">
          <button class="period-tab active" data-period="all">All Time</button>
          <button class="period-tab" data-period="month">This Month</button>
          <button class="period-tab" data-period="week">This Week</button>
        </div>
      </div>
    </header>

    <main class="page-content">

      <!-- Mini summary row -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px">
        <div class="stat-card income anim-slideUp anim-delay-1">
          <div class="stat-icon"><i class="fa-solid fa-arrow-trend-up"></i></div>
          <div class="stat-info"><div class="stat-label">Total Income</div><div class="stat-value" style="color:var(--success)" id="aStatIncome">₹0</div></div>
        </div>
        <div class="stat-card expense anim-slideUp anim-delay-2">
          <div class="stat-icon"><i class="fa-solid fa-arrow-trend-down"></i></div>
          <div class="stat-info"><div class="stat-label">Total Expenses</div><div class="stat-value" style="color:var(--danger)" id="aStatExpense">₹0</div></div>
        </div>
        <div class="stat-card balance anim-slideUp anim-delay-3">
          <div class="stat-icon"><i class="fa-solid fa-scale-balanced"></i></div>
          <div class="stat-info"><div class="stat-label">Balance</div><div class="stat-value" style="color:var(--gold)" id="aStatBalance">₹0</div></div>
        </div>
      </div>

      <!-- Charts grid -->
      <div class="analytics-grid">

        <!-- Pie chart -->
        <div class="chart-box anim-slideUp anim-delay-1">
          <h3><i class="fa-solid fa-chart-pie" style="color:var(--accent)"></i> Expense by Category</h3>
          <div class="chart-canvas-wrap">
            <canvas id="pieChart"></canvas>
          </div>
          <div class="legend-grid" id="pieLegend"></div>
        </div>

        <!-- Bar chart -->
        <div class="chart-box anim-slideUp anim-delay-2">
          <h3><i class="fa-solid fa-chart-bar" style="color:var(--gold)"></i> Income vs Expenses by Category</h3>
          <div class="chart-canvas-wrap" style="height:300px">
            <canvas id="barChart"></canvas>
          </div>
        </div>
      </div>

      <!-- Category breakdown table -->
      <div class="chart-box anim-slideUp anim-delay-3">
        <h3><i class="fa-solid fa-table-list" style="color:var(--success)"></i> Category Breakdown</h3>
        <div style="overflow-x:auto">
          <table class="cat-table">
            <thead>
              <tr>
                <th>Category</th>
                <th>Type</th>
                <th>Total Amount</th>
                <th>% of Total</th>
                <th>Distribution</th>
              </tr>
            </thead>
            <tbody id="catTableBody">
              <tr><td colspan="5"><div class="empty-state"><i class="fa-solid fa-chart-pie"></i><p>No data yet</p></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/toast.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/analytics.js"></script>
</body>
</html>
